<style>
.top-banner {
  background: #ff6600;
  color: white;
  text-align: center;
  padding: 10px;
  font-weight: bold;
}

/* Estilo visual del banner */
body::before {
  content: "Retro-Fred Project";
  display: block;
  background: linear-gradient(90deg, #ff6600, #ff9900);
  color: white;
  text-align: center;
  padding: 10px;
  font-weight: bold;
}

/* Evitar que el header se solape */
.site-header {
  margin-top: 0;
}
</style>

<script>
document.documentElement.setAttribute("data-lang", "{{ page.lang }}");
</script>

{% assign translations = site.en | concat: site.es | where: "ref", page.ref %}

<div style="position:absolute; top:12px; right:20px; z-index:9999;">
{% for t in translations %}
  {% if t.lang != page.lang %}
    <a href="{{ t.url | relative_url }}"
       style="color:white; font-weight:bold; text-decoration:none;">
      {% if t.lang == "en" %}
        English
      {% elsif t.lang == "es" %}
        Español
      {% endif %}
    </a>
  {% endif %}
{% endfor %}
</div>
