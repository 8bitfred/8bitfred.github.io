<link rel="canonical" href="{{ page.url | absolute_url }}">

<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:type" content="website">
<meta property="og:image" content="{{ '/assets/images/8bitfred-social.jpg' | absolute_url }}">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
<meta name="twitter:image" content="{{ '/assets/images/FredBanner/8bitfred-social.jpg' | absolute_url }}">

{% assign translations = site.pages
   | concat: site.en
   | concat: site.es
   | where: "ref", page.ref %}

{% for t in translations %}
<link rel="alternate"
      hreflang="{{ t.lang }}"
      href="{{ t.url | absolute_url }}">
{% endfor %}


<style>
.top-banner {
  background: #ff6600;
  color: white;
  text-align: center;
  padding: 10px;
  font-weight: bold;
}

/* Banner inglés */
html[data-lang="en"] body::before {
  content: "Retro-Fred Project";
  display: block;
  background: linear-gradient(90deg, #ff6600, #ff9900);
  color: white;
  text-align: center;
  padding: 10px;
  font-weight: bold;
}

/* Banner español */
html[data-lang="es"] body::before {
  content: "Proyecto Retro-Fred";
  display: block;
  background: linear-gradient(90deg, #ff6600, #ff9900);
  color: white;
  text-align: center;
  padding: 10px;
  font-weight: bold;
}

/* Evitar que el header se solape */
.site-header {
  margin-top: 0;
}

.site-nav .nav-category {
  display: none;
}
</style>



<style>
.lang-switch {
  position: absolute;
  top: 0.3rem;
  right: 4.5rem;
  z-index: 200;
}

.lang-switch a {
  text-decoration: none;
  font-size: 1.4rem;
  margin-left: 0.4rem;
}

.lang-switch img {
  width: 20px;
  height: auto;
  vertical-align: middle;
}

/* móvil */
@media (max-width: 800px) {
  .lang-switch {
    right: 3.2rem;
    top: 0.3rem;
  }

  .lang-switch a {
    font-size: 1.2rem;
  }

  .lang-switch img {
    width: 18px;
  }

}
</style>

<script>
document.addEventListener("DOMContentLoaded", function () {

  const template = document.getElementById("lang-switch-template");

  if (template) {

    const div = document.createElement("div");
    div.className = "lang-switch";
    div.innerHTML = template.innerHTML;

    document.body.appendChild(div);
  }
});
</script>

<script>
document.documentElement.setAttribute("data-lang", "{{ page.lang }}");
</script>
